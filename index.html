<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>dnnr</title>
    <script>
      function toggleTheme() {
        document.querySelector("html").classList.toggle("light");
        const profileImg = document.querySelector("#profile img");
        profileImg.src = !profileImg.src.includes("light")
          ? "./assets/avatar-light.png"
          : "./assets/avatar.png";
      }
    </script>
  </head>

  <body>
    <div id="container">
      <div id="profile">
        <img
          src="./assets/avatar.png"
          alt="Foto de Denner Azevedo sorrindo, usando óculos e camisa azul, barba e fundo azul claro."
        />
        <p>@dnnraz</p>
      </div>
      <div id="switch">
        <button onClick="toggleTheme()"></button>
        <span onClick="toggleTheme()"></span>
      </div>
      <ul id="link-list">
        <li>
          <a target="_blank" rel="noopener" href="https://dnnr.dev/">
            <ion-icon name="planet"></ion-icon>
            <p>Saiba mais sobre mim</p>
          </a>
        </li>
        <li>
          <a
            target="_blank"
            rel="noopener"
            href="https://www.youtube.com/@devdenegociosmg"
          >
            <ion-icon name="logo-youtube"></ion-icon>
            <p>Youtube</p>
          </a>
        </li>
        <li>
          <a
            target="_blank"
            rel="noopener"
            href="https://www.bibliotecasecreta.com.br/"
          >
            <ion-icon name="book"></ion-icon>
            <p>Biblioteca Secreta</p>
          </a>
        </li>
        <li>
          <a target="_blank" rel="noopener" href="https://os.dnnr.dev/">
            <ion-icon name="save"></ion-icon>
            <p>os.dnnr.dev</p>
          </a>
        </li>
        <li>
          <a target="_blank" rel="noopener" href="https://tools.dnnr.dev/">
            <ion-icon name="hammer"></ion-icon>
            <p>tools.dnnr.dev</p>
          </a>
        </li>
      </ul>
      <div id="social-links">
        <a
          target="_blank"
          rel="noopener"
          href="https://github.com/dennergazevedo"
        >
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a
          target="_blank"
          rel="noopener"
          href="https://www.linkedin.com/in/dnnr"
        >
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
        <a
          target="_blank"
          rel="noopener"
          href="mailto:dennergazevedo@gmail.com"
        >
          <ion-icon name="send"></ion-icon>
        </a>
        <a
          target="_blank"
          rel="noopener"
          href="https://www.instagram.com/dnnraz/"
        >
          <ion-icon name="logo-instagram"></ion-icon>
        </a>
        <a target="_blank" rel="noopener" href="./assets/dnr-cv.pdf">
          <ion-icon name="document"></ion-icon>
        </a>
      </div>
    </div>
    <footer>
      <p>Feito por <a href="https://dnnr.dev">dnnr.dev</a></p>
    </footer>
  </body>
</html>
